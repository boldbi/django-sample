<!DOCTYPE html>
<html>

<head>
    <script type='text/javascript' src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js'></script>
    <script type="text/javascript" src="https://cdn.boldbi.com/embedded-sdk/v15.1.65/boldbi-embed.js"></script>
    <script type="text/javascript">
        async function fetchEmbedAndLoad() {
            try {
                const response = await fetch("{% url 'getdetails' %}");
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                // Transform keys to PascalCase expected by the embed API
                const transformed = {
                    DashboardId: data.DashboardId || data.dashboardId || data.dashboard_id,
                    EmbedType: data.EmbedType || data.embedType || data.embed_type || 'component',
                    Environment: data.Environment || data.environment || 'onpremise',
                    ServerUrl: data.ServerUrl || data.serverUrl || data.server_url,
                    SiteIdentifier: data.SiteIdentifier || data.siteIdentifier || data.site_identifier
                };

                const dashboard = BoldBI.create({
                    serverUrl: transformed.ServerUrl + "/" + transformed.SiteIdentifier,
                    dashboardId: transformed.DashboardId,
                    embedContainerId: 'dashboard',
                    authorizationServer: { url: "{% url 'authorization_server' %}" }
                });

                dashboard.loadDashboard();
            } catch (error) {
                console.error('Failed to load embed config:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchEmbedAndLoad);
    </script>
</head>

<body>
    <div id="viewer-section">
        <div id="dashboard"></div>
    </div>
</body>

</html>
